apiVersion: apps/v1
kind: Deployment
metadata:
  name: grade-app-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grade-v1
  template:
    metadata:
      labels:
        app: grade-v1
    spec:
      containers:
      - name: grade-app
        image: yourdockerhub/grade-app:v1
        ports:
        - containerPort: 3000
